publish_to: 'none'
version: 0.1.2+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.4.0+2
  path: ^1.9.1
  dropdown_search: ^6.0.2
  sqflite_common_ffi_web: ^1.1.1
  package_info_plus: ^9.0.0
  logger: ^2.6.2
